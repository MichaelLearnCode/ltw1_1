{% extends 'admin_base.html' %} 

{% block admin_content %}
<script type="module">
  import { Editor } from "https://esm.sh/@tiptap/core";
  import StarterKit from "https://esm.sh/@tiptap/starter-kit";

  const editor = new Editor({
    element: document.querySelector("#editor"),
    extensions: [StarterKit],
    content: {{ dv.mo_ta | tojson | safe }},
    onUpdate({ editor }) {
      document.querySelector("#mo_ta_input").value = editor.getHTML();
    },
  });

  const editorElement = document.querySelector("#editor");
  editorElement.addEventListener("click", () => editor.commands.focus('end'));
</script>

<style>
  .ProseMirror:focus {
    outline: none !important;
  }
</style>

<div class="p-8">
  <h1 class="text-3xl font-bold mb-8 text-gray-800">Chỉnh sửa đơn vị</h1>

  <form enctype="multipart/form-data" method="POST" class="grid grid-cols-2 gap-x-8 gap-y-6">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Tên</label>
      <input type="text" name="ten" value="{{ dv.ten_don_vi }}" required
        class="w-full px-4 py-2 border border-gray-300 rounded focus:ring-primary focus:border-primary bg-gray-100" />
    </div>
    
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Địa điểm</label>
      <input type="text" name="dia_diem" value="{{ dv.dia_diem or '' }}"
        class="w-full px-4 py-2 border border-gray-300 rounded focus:ring-primary focus:border-primary bg-gray-100" />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
      <input type="email" name="email" value="{{ dv.email or '' }}"
        class="w-full px-4 py-2 border border-gray-300 rounded focus:ring-primary focus:border-primary bg-gray-100" />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Điện thoại</label>
      <input type="text" name="phone" value="{{ dv.dien_thoai or '' }}"
        class="w-full px-4 py-2 border border-gray-300 rounded focus:ring-primary focus:border-primary bg-gray-100" />
    </div>

    <div class="col-span-2">
      <label class="block text-sm font-medium text-gray-700 mb-1">Link website</label>
      <input type="url" name="website" value="{{ dv.website or '' }}"
        class="w-full px-4 py-2 border border-gray-300 rounded focus:ring-primary focus:border-primary bg-gray-100" />
    </div>

    <div class="col-span-2">
      <label class="block text-sm font-medium text-gray-700 mb-1">Image (Để trống nếu giữ nguyên ảnh cũ)</label>
      <input type="file" name="image"
        class="w-full px-4 py-2 border border-gray-300 rounded focus:ring-primary focus:border-primary bg-white file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-sm file:font-semibold file:bg-primary-50 file:text-primary-700 hover:file:bg-primary-100" />
      {% if dv.image_url %}
        <p class="mt-2 text-xs text-gray-500 italic">Ảnh hiện tại: {{ dv.image_url.split('/')[-1] }}</p>
      {% endif %}
    </div>

    <div class="col-span-2 flex items-center gap-x-6 py-4 border-y border-gray-200 bg-gray-50 px-4 rounded">
      <div class="flex items-center opacity-60">
        <input type="checkbox" id="is_dv2" disabled {% if is_dv2 %}checked{% endif %}
          class="h-4 w-4 text-primary border-gray-300 rounded" />
        <label class="ml-2 block text-sm font-medium text-gray-700">Đơn vị 2 ?</label>
      </div>

      <div class="flex-grow">
        <select name="dv1_id" {% if not is_dv2 %}disabled{% endif %}
          class="w-full px-4 py-2 border border-gray-300 rounded focus:ring-primary focus:border-primary disabled:bg-gray-200 bg-white">
          <option value="">-- Thuộc Đơn vị cấp 1 --</option>
          {% for d1 in dvs1 %}
          <option value="{{ d1.id }}" {% if d1.id == dv.don_vi_cap_1_id %}selected{% endif %}>
            {{ d1.ten_don_vi }}
          </option>
          {% endfor %}
        </select>
      </div>
    </div>

    <div class="col-span-2">
      <label class="block text-sm font-medium text-gray-700 mb-1">Mô tả</label>
      <div class="h-[300px] w-full border border-gray-300 p-4 bg-white rounded focus-within:ring-2 focus-within:ring-primary/20 outline-none">
        <div class="h-full w-full overflow-y-auto" id="editor"></div>
      </div>
      <input type="hidden" name="mo_ta" id="mo_ta_input" value="{{ dv.mo_ta }}" />
    </div>

    <div class="col-span-2 flex justify-end mt-8 gap-4">
        <a href="{{ url_for('admin.admin_donvi1') if not is_dv2 else url_for('admin.admin_donvi2') }}" 
           class="px-8 py-3 bg-gray-200 rounded font-bold hover:bg-gray-300 transition">Hủy</a>
        
        <button type="submit" 
         class="bg-primary items-center flex justify-center gap-2 cursor-pointer text-white font-bold px-12 py-3 rounded hover:bg-primary-700 transition">
            Cập nhật
        </button>
    </div>
  </form>
</div>
{% endblock %}
