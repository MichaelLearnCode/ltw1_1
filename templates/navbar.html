<nav class="bg-white shadow-md sticky top-0 z-[1000]">
  <div
    class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between h-16 items-center"
  >
    <a
      href="{% if user %}{{ url_for('admin.dashboard') }}{% else %}{{ url_for('donvi.index') }}{% endif %}"
      class="font-bold text-xl tracking-wider text-primary"
      >Nhom1</a
    >

    <div class="flex items-center">
      {% if user %}
      <div class="relative ml-3">
        <div>
          <button
            type="button"
            class="flex items-center max-w-xs bg-white rounded-full"
          >
            <span class="mr-3 text-sm font-medium text-gray-700 hidden sm:block"
              >Xin chào, {{ user.username }}</span
            >

            <div
              id="user-menu-button"
              onclick="toggleUserDropdown()"
              class="h-10 w-10 cursor-pointer rounded-full bg-primary flex items-center justify-center text-white font-bold text-lg shadow-inner uppercase"
            >
              {{ user.username[0] }}
            </div>
          </button>
        </div>

        <div
          id="user-dropdown"
          class="hidden origin-top-right absolute right-0 mt-2 w-48 rounded-md shadow-lg py-1 bg-white z-50"
        >
          <a
            href="{{ url_for('user.logout') }}"
            class="flex items-center gap-2 px-4 py-3 text-sm text-red-600 hover:bg-red-50 transition-colors"
          >
            <i class="ph ph-sign-out text-lg"></i>
            Đăng Xuất
          </a>
        </div>
      </div>
      {% else %}
      <a
        href="{{ url_for('user.login') }}"
        class="bg-primary text-white hover:bg-primary-500 px-4 py-2 rounded transition"
      >
        Đăng Nhập
      </a>
      {% endif %}
    </div>
  </div>
</nav>

<script>
  function toggleUserDropdown() {
    const dropdown = document.getElementById("user-dropdown");
    dropdown.classList.toggle("hidden");
  }

  window.addEventListener("click", function (e) {
    const dropdown = document.getElementById("user-dropdown");
    const button = document.getElementById("user-menu-button");

    if (
      dropdown &&
      !button.contains(e.target) &&
      !dropdown.contains(e.target)
    ) {
      dropdown.classList.add("hidden");
    }
  });
</script>
