{% extends 'base.html' %} {% block navbar %}{% endblock %} {% block footer %}{%
endblock %} {% block content %}
<div
  class="relative min-h-screen w-full flex items-center justify-center overflow-hidden"
>
  <div
    class="absolute inset-0 bg-cover bg-no-repeat bg-center"
    style="background-image: url('{{ url_for('static', filename='images/bg-login.webp') }}');"
  ></div>

  <div class="absolute inset-0 bg-white/20 backdrop-blur-sm"></div>

  <div
    class="relative z-10 bg-white p-8 rounded-lg shadow-2xl w-full max-w-md border border-white/20"
  >
    <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Đăng Nhập</h2>

    {% if error %}
    <p
      class="text-red-500 text-sm mb-4 text-center bg-red-50 py-2 rounded border border-red-100"
    >
      {{ error }}
    </p>
    {% endif %}

    <form method="POST" class="flex flex-col gap-4">
      <div>
        <label class="block text-gray-700 text-sm font-bold mb-2"
          >Tên đăng nhập</label
        >
        <input
          type="text"
          name="username"
          required
          class="w-full border border-gray-300 px-3 py-2 rounded-sm focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-all"
        />
      </div>

      <div class="mb-2">
        <label class="block text-gray-700 text-sm font-bold mb-2"
          >Mật khẩu</label
        >
        <input
          type="password"
          name="password"
          required
          class="w-full border border-gray-300 px-3 py-2 rounded-sm focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-all"
        />
      </div>

      <button
        type="submit"
        class="w-full cursor-pointer bg-primary text-white font-bold py-3 px-4 rounded-sm hover:bg-primary-700 active:scale-[0.98] transition-all shadow-lg shadow-primary/20"
      >
        Đăng Nhập
      </button>
    </form>

    <div class="mt-6 text-center">
      <a
        href="{{ url_for('donvi.index') }}"
        class="text-sm text-gray-500 hover:text-primary transition"
      >
        &larr; Quay lại trang chủ
      </a>
    </div>
  </div>
</div>
{% endblock %}
