{% extends 'admin_base.html' %} {% block admin_content %}
<script type="module">
  import { Editor } from "https://esm.sh/@tiptap/core";
  import StarterKit from "https://esm.sh/@tiptap/starter-kit";

  const editor = new Editor({
    element: document.querySelector("#editor"),
    extensions: [StarterKit],
    content: "",
    onUpdate({ editor }) {
      document.querySelector("#mo_ta_input").value = editor.getHTML();
    },
  });
</script>
<style>
  .ProseMirror:focus {
    outline: none !important;
  }
</style>
<div class="p-8">
  <h1 class="text-3xl font-bold mb-8 text-gray-800">Tạo đơn vị</h1>

  <form
    enctype="multipart/form-data"
    method="POST"
    class="grid grid-cols-2 gap-x-8 gap-y-6"
  >
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Tên</label>
      <input
        type="text"
        name="ten"
        required
        class="w-full px-4 py-2 border border-gray-300 rounded focus:ring-primary focus:border-primary bg-gray-100"
      />
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1"
        >Địa điểm</label
      >
      <input
        type="text"
        name="dia_diem"
        class="w-full px-4 py-2 border border-gray-300 rounded focus:ring-primary focus:border-primary bg-gray-100"
      />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
      <input
        type="email"
        name="email"
        class="w-full px-4 py-2 border border-gray-300 rounded focus:ring-primary focus:border-primary bg-gray-100"
      />
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1"
        >Điện thoại</label
      >
      <input
        type="text"
        name="phone"
        class="w-full px-4 py-2 border border-gray-300 rounded focus:ring-primary focus:border-primary bg-gray-100"
      />
    </div>

    <div class="col-span-2">
      <label class="block text-sm font-medium text-gray-700 mb-1"
        >Link website</label
      >
      <input
        type="url"
        name="website"
        class="w-full px-4 py-2 border border-gray-300 rounded focus:ring-primary focus:border-primary bg-gray-100"
      />
    </div>

    <div class="col-span-2">
      <label class="block text-sm font-medium text-gray-700 mb-1">Image</label>
      <input
        type="file"
        name="image"
        class="w-full px-4 py-2 border border-gray-300 rounded focus:ring-primary focus:border-primary bg-white file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-sm file:font-semibold file:bg-primary-50 file:text-primary-700 hover:file:bg-primary-100"
      />
    </div>
    <div
      class="col-span-2 flex items-center gap-x-6 py-4 border-y border-gray-200"
    >
      <div class="flex items-center">
        <input
          type="checkbox"
          id="is_dv2"
          name="is_dv2"
          class="h-4 w-4 text-primary border-gray-300 rounded focus:ring-primary bg-gray-100"
        />
        <label for="is_dv2" class="ml-2 block text-sm font-medium text-gray-700"
          >Đơn vị 2 ?</label
        >
      </div>

      <div class="flex-grow">
        <select
          id="dv1_select"
          name="dv1_id"
          disabled
          class="w-full px-4 py-2 border border-gray-300 rounded focus:ring-primary focus:border-primary disabled:bg-gray-200 bg-white"
        >
          <option value="">-- Chọn đơn vị cấp 1 cha --</option>
          {% for dv in dvs1 %}
          <option value="{{ dv.id }}">{{ dv.ten_don_vi }}</option>
          {% endfor %}
        </select>
      </div>
    </div>

    <div class="col-span-2">
      <label class="block text-sm font-medium text-gray-700 mb-1">Mô tả</label>
      <div
        class="h-[300px] w-full border border-gray-300 p-4 bg-white rounded-b focus-within:ring-2 focus-within:ring-primary/20 outline-none"
      >
        <div class="h-full w-full overflow-y-auto" id="editor"></div>
      </div>

      <input type="hidden" name="mo_ta" id="mo_ta_input" />
    </div>

    <div class="col-span-2 flex justify-end mt-8">
      <button
        type="submit"
        class="bg-primary items-center flex justify-center gap-2 cursor-pointer text-white font-bold px-12 py-3 rounded hover:bg-primary-700 transition"
      >
        <i class="ph ph-plus"></i>
        Tạo
      </button>
    </div>
  </form>
</div>

<script>
  const checkbox = document.getElementById("is_dv2");
  const select = document.getElementById("dv1_select");

  checkbox.addEventListener("change", function () {
    select.disabled = !this.checked;
  });
</script>
{% endblock %}
